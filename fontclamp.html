<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS clamp() 計算ツール</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }
        label, input, select {
            display: block;
            margin-bottom: 10px;
        }
        input, select {
            background-color: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 5px;
            width: 200px;
            box-sizing: border-box;
        }
        .inline-group {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 10px;
        }
        .inline-group label, .inline-group select, .inline-group input {
            margin-bottom: 0;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
        }
        button {
            margin-top: 10px;
            background-color: #6200ea;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #3700b3;
        }
    </style>
</head>
<body>
    <h2>CSS clamp() 計算ツール</h2>
    
    <div class="inline-group">
        <label>1rem の基準単位:
            <select id="unitType" onchange="toggleUnitHint()">
                <option value="px">px (ピクセル)</option>
                <option value="percent">% (パーセント)</option>
            </select>
        </label>
        <label>基準値: 
            <input type="number" id="baseValue" value="16" step="0.1">
        </label>
    </div>
    <small id="unitHint" style="color: #aaa; display: block; margin-bottom: 15px;">※ブラウザ標準は 16px です</small>
    
    <hr style="border:0; border-top:1px solid #333; margin:20px 0;">

    <label>最小文字サイズ (rem): <input type="number" id="minSize" value="6" step="0.1"></label>
    <label>最大文字サイズ (rem): <input type="number" id="maxSize" value="8" step="0.1"></label>
    <label>最小画面幅 (px): <input type="number" id="minWidth" value="1280"></label>
    <label>最大画面幅 (px): <input type="number" id="maxWidth" value="1920"></label>
    <button onclick="calculateClamp()">計算</button>
    <div class="result" id="result"></div>
    <button onclick="copyToClipboard()" id="copyButton" style="display:none;">コピー</button>

    <script>
        function toggleUnitHint() {
            let unitType = document.getElementById("unitType").value;
            let baseValueInput = document.getElementById("baseValue");
            let hint = document.getElementById("unitHint");
            
            if (unitType === "px") {
                baseValueInput.value = "16";
                hint.innerText = "※ブラウザ標準は 16px です（例: 10px など）";
            } else {
                baseValueInput.value = "87.5";
                hint.innerText = "※htmlのfont-sizeに対する%設定（例: 87.5% = 14px換算、62.5% = 10px換算）";
            }
        }

        function calculateClamp() {
            let unitType = document.getElementById("unitType").value;
            let baseValue = parseFloat(document.getElementById("baseValue").value);

            let minRemVal = parseFloat(document.getElementById("minSize").value);
            let maxRemVal = parseFloat(document.getElementById("maxSize").value);
            let minWidth = parseFloat(document.getElementById("minWidth").value);
            let maxWidth = parseFloat(document.getElementById("maxWidth").value);
            
            // 選択された単位から、最終的な 1rem あたりの実際の px 数を動的に割り出す
            let rootPx = 16; // ブラウザの絶対規定値
            if (unitType === "px") {
                rootPx = baseValue;
            } else if (unitType === "percent") {
                // 例: 87.5% なら 16 * (87.5 / 100) = 14px になる
                rootPx = 16 * (baseValue / 100);
            }

            // 正確に算出された rootPx をベースに内部 px を計算（これでバグを完全に回避）
            let minPx = minRemVal * rootPx;
            let maxPx = maxRemVal * rootPx;

            // 1. 傾き(slope)の計算 [vw]
            let slopeVal = ((maxPx - minPx) / (maxWidth - minWidth)) * 100;
            let slope = slopeVal.toFixed(3) + "vw";
            
            // 2. 切片(intercept)を rem 単位で計算
            let interceptPxVal = minPx - (((maxPx - minPx) / (maxWidth - minWidth)) * minWidth);
            let interceptRem = (interceptPxVal / rootPx).toFixed(3) + "rem";
            
            // 最小・最大値の文字列
            let minRem = minRemVal.toFixed(3) + "rem";
            let maxRem = maxRemVal.toFixed(3) + "rem";
            
            // 計算結果の組み立て
            let clampValue = `clamp(${minRem}, ${interceptRem} + ${slope}, ${maxRem})`;
            
            document.getElementById("result").innerText = "CSS clamp(): " + clampValue;
            
            let copyButton = document.getElementById("copyButton");
            copyButton.style.display = "block";
            copyButton.setAttribute("data-clipboard", "font-size: " + clampValue + "; /* 計算基準: 1rem=" + rootPx.toFixed(1) + "px、最小" + minRem + "、最大" + maxRem + "、画面幅" + minWidth + "px〜" + maxWidth + "px */");
        }

        function copyToClipboard() {
            let clampValue = document.getElementById("copyButton").getAttribute("data-clipboard");
            navigator.clipboard.writeText(clampValue).then(() => {
                alert("コピーしました: " + clampValue);
            }).catch(err => {
                console.error("コピーに失敗しました", err);
            });
        }
    </script>
</body>
</html>
